<!--
  Supabase Dashboard → Authentication → Email Templates → "Confirm signup"
  Paste the BODY content below (from <h2> through the last <p>) into the template editor,
  or use the full document if your editor accepts HTML emails.
  Required variable: {{ .ConfirmationURL }}
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirm your signup</title>
</head>
<body style="margin:0;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background-color:#f4f4f5;color:#111827;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px;margin:0 auto;">
    <tr>
      <td style="background:#ffffff;border-radius:12px;padding:32px 28px;border:1px solid #e5e7eb;">
        <h2 style="margin:0 0 16px;font-size:22px;font-weight:700;color:#111827;">Confirm your EduBridge account</h2>
        <p style="margin:0 0 20px;font-size:16px;line-height:1.5;color:#4b5563;">Thanks for signing up. Tap the button below to confirm your email:</p>
        <p style="margin:0 0 24px;">
          <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:12px 24px;background:#2563eb;color:#ffffff;text-decoration:none;border-radius:8px;font-weight:600;font-size:16px;">Confirm your email</a>
        </p>
        <p style="margin:0 0 8px;font-size:14px;color:#6b7280;">If the button doesn’t work, copy and paste this link into your browser:</p>
        <p style="margin:0;font-size:12px;word-break:break-all;color:#2563eb;">{{ .ConfirmationURL }}</p>
      </td>
    </tr>
  </table>
</body>
</html>
